services:
  mcp-server:
    image: ghcr.io/pedroct/fastapi-llm-toolkit:latest
    ports:
      - "8000:8000"
    environment:
      MCP_TRANSPORT: streamable-http
      FASTAPI_KB_QDRANT_URL: http://qdrant:6333
    volumes:
      - model_cache:/root/.cache/huggingface
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.18.0
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  qdrant_data:
  model_cache:
