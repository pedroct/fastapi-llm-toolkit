# Sobrescreve docker-compose.yml para desenvolvimento local.
# Aplicado automaticamente por `docker compose` — sem flags extras.
# Produção usa docker-compose.yml sozinho (sem este arquivo).
services:
  mcp-server:
    build: .
    image: fastapi-llm-toolkit:local
    volumes:
      - model_cache:/root/.cache/huggingface
      - ./output:/app/output   # acessa chunks.jsonl para build_index

  qdrant:
    ports:
      - "6333:6333"   # expõe dashboard só em dev (http://localhost:6333/dashboard)
