[project]
name = "fastapi-kb-rag"
version = "0.1.0"
description = "Ingestão e recuperação da base de conhecimento do FastAPI."
requires-python = ">=3.12"
dependencies = [
    "fastapi-kb-core",
    "requests>=2.31",
    "beautifulsoup4>=4.12",
    "markdownify>=0.13",
    "qdrant-client>=1.12",
    "sentence-transformers>=3.0",
    "torch>=2.0",
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
fastapi-kb-core = { workspace = true }
torch = [{ index = "pytorch-cpu" }]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fastapi_kb_rag"]
