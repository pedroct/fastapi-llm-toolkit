[project]
name = "fastapi-kb-core"
version = "0.1.0"
description = "Domínio compartilhado: modelos, chunker e catálogo de fontes da doc do FastAPI."
requires-python = ">=3.12"
dependencies = [
    "semver>=3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fastapi_kb_core"]
