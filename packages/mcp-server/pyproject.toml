[project]
name = "fastapi-kb-mcp"
version = "0.1.0"
description = "Servidor MCP que une a base /reference com introspecção do projeto."
requires-python = ">=3.12"
dependencies = [
    "fastapi-kb-core",
    "fastapi-kb-rag",
    "fastmcp>=2.7",
]

[project.scripts]
fastapi-kb-mcp = "fastapi_kb_mcp.server:main"

[tool.uv.sources]
fastapi-kb-core = { workspace = true }
fastapi-kb-rag = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fastapi_kb_mcp"]
